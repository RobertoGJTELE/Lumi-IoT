<!--
Single-page web application containing the user interface (HTML, CSS, and JavaScript)
and the asynchronous communication logic with the Rasa server.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumi Chatbot - Web Interface</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .chat-container {
            width: 100%;
            max-width: 700px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 80vh;
            max-height: 700px;
        }
        .chat-header {
            background: #2c3e50;
            color: white;
            padding: 15px 20px;
            font-size: 1.3rem;
            font-weight: bold;
            text-align: center;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f9f9fc;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 18px;
            line-height: 1.4;
            word-wrap: break-word;
            font-size: 14px;
        }
        .user-message {
            background: #0084ff;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .bot-message {
            background: #e4e6eb;
            color: #050505;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            white-space: pre-wrap;
        }
        .typing {
            font-style: italic;
            color: #6c757d;
            background: transparent;
            padding: 5px 15px;
        }
        .input-area {
            display: flex;
            padding: 15px;
            background: white;
            border-top: 1px solid #ddd;
            gap: 10px;
        }
        #messageInput {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 30px;
            font-size: 14px;
            outline: none;
        }
        #sendBtn {
            background: #2c3e50;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        #sendBtn:hover {
            background: #1a2a3a;
        }
        .status {
            font-size: 12px;
            color: #888;
            text-align: center;
            padding: 5px;
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">Lumi Chatbot</div>

    <div class="chat-messages" id="chatMessages">
        <div class="message bot-message">
            Hello. I am Lumi. You can send requests such as "block 10.0.0.1 to 10.0.0.2" or "allow 192.168.1.1 to 10.0.0.5".
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="messageInput" placeholder="Type your message..." autofocus>
        <button id="sendBtn">Send</button>
    </div>

    <div class="status" id="status"></div>
</div>

<script>
    const chatMessages = document.getElementById('chatMessages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusDiv = document.getElementById('status');

    // Session identifier for the user
    const SENDER_ID = "web_user_" + Math.random().toString(36).substring(2, 8);

    // Rasa REST webhook endpoint
    const RASA_URL = "http://172.29.36.54:5005/webhooks/rest/webhook";

    function addMessage(text, isUser) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
        messageDiv.textContent = text;
        chatMessages.appendChild(messageDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function showTyping() {
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message bot-message typing';
        typingDiv.id = 'typingIndicator';
        typingDiv.textContent = 'Lumi is typing...';
        chatMessages.appendChild(typingDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function hideTyping() {
        const typing = document.getElementById('typingIndicator');
        if (typing) typing.remove();
    }

    async function sendMessageToBot(userMessage) {
        if (!userMessage.trim()) return;

        addMessage(userMessage, true);
        messageInput.value = '';
        statusDiv.textContent = 'Sending...';

        showTyping();

        try {
            const response = await fetch(RASA_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    sender: SENDER_ID,
                    message: userMessage
                })
            });

            hideTyping();
            statusDiv.textContent = '';

            if (!response.ok) {
                throw new Error('HTTP error ' + response.status);
            }

            const data = await response.json();

            if (Array.isArray(data) && data.length > 0) {
                data.forEach(msg => {
                    if (msg.text) {
                        addMessage(msg.text, false);
                    }
                });
            } else {
                addMessage('No response from bot.', false);
            }
        } catch (error) {
            hideTyping();
            statusDiv.textContent = 'Error: ' + error.message;
            addMessage(
                'Connection error: ' + error.message + '. Ensure the chatbot is running at ' + RASA_URL,
                false
            );
        }
    }

    sendBtn.addEventListener('click', () => {
        sendMessageToBot(messageInput.value);
    });

    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            sendMessageToBot(messageInput.value);
        }
    });
</script>
</body>
</html>
