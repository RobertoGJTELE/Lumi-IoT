#Configuration of the NLU pipeline and dialogue policies.
language: en
pipeline:
  - name: WhitespaceTokenizer
  - name: RegexFeaturizer
    case_sensitive: false
  - name: LexicalSyntacticFeaturizer
  - name: CountVectorsFeaturizer
  - name: CountVectorsFeaturizer
    analyzer: char_wb
    min_ngram: 1
    max_ngram: 4
    lowercase: true
  - name: DIETClassifier
    epochs: 100
    constrain_similarities: true
  - name: EntitySynonymMapper
  - name: rasa_composite_entities.CompositeEntityExtractor
    composite_patterns_path: ./data/composite.json
  - name: ResponseSelector
    epochs: 100
policies:
  - name: MemoizationPolicy
  - name: TEDPolicy
    max_history: 5
    epochs: 100
  - name: MappingPolicy
  - name: RulePolicy
data:
  nlu: "data/intents.yml"
  stories: "data/stories.yml"
  rules: "data/rules.yml"
