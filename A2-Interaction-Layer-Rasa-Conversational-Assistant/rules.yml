#Declaration of the rule-based dialogue flow for intent-to-action mapping, including conditional execution based on slot states, to manage build, feedback, confirmation, cancellation, greeting, and robotics law queries.
version: "2.0"
rules:
  - rule: Build Nile intent or continue feedback
    steps:
      - intent: build
      - action: action_build
  - rule: Start feedback on reject
    steps:
      - intent: reject
      - action: action_feedback
  - rule: Always handle feedback input
    steps:
      - intent: build-feedback
      - action: action_feedback
  - rule: Confirm and deploy
    condition:
      - slot_was_set:
          - awaiting_feedback: false
    steps:
      - intent: confirm
      - action: action_feedback_confirm
  - rule: Cancel at any time
    steps:
      - intent: cancel
      - action: action_cancel
  - rule: Say hello
    condition:
      - slot_was_set:
          - awaiting_feedback: false
    steps:
      - intent: welcome
      - action: utter_greet
  - rule: Robotics laws
    condition:
      - slot_was_set:
          - awaiting_feedback: false
    steps:
      - intent: ask_robotics_laws
      - action: action_robotics_laws
